<html>
    <head>    
        <title>Saloon-Crawl Project</title>
        <meta content="Undead-Uprising Page"> 
        <link rel="shortcut icon" href="#">
        <link rel="stylesheet" href="ProjectPage.css">
        <link rel="stylesheet" href="SaloonCrawl.css">

    </head>
<header>
   <div id = "SaloonCrawl-header">
         <h1 class="header-text" >Saloon Crawl</h1>
             <div class="git-Link-container">
        <a class="git-link" target="_blank" href="https://github.com/JRRoddy/SaloonCrawl">Git hub Link</a>            
      </div>
      
 
   </div>
   <div class="project-info">
        <p class="project-info-header">PROJECT INFO</p>
        <div class="project-type">
            <p class="project-def">Game</p>
            <p class="project-motive">Personal</p>
        </div>
        
        <div class="project-meta">
            <div class="project-meta-item">
                 <p class="meta-left" >Time Span</p>
                 <p class="meta-right" >3 weeks </p>
            </div>
             <div class="project-meta-item">
                 <p class="meta-left" >Team Size</p>
                 <p class="meta-right" >3</p>
            </div>
             <div class="project-meta-item">
                 <p class="meta-left" >Genre</p>
                 <p class="meta-right" >2D auto runner</p>
            </div>
             <div class="project-meta-item">
                 <p class="meta-left" >Platform</p>
                 <p class="meta-right" >Mobile</p>
            </div>
            <div class="project-meta-item">
                 <p class="meta-left" >Status</p>
                 <p class="meta-right" >Finished</p>
            </div>
            



        </div>

         
   </div>
</header>
<body>
    
    <div id = "main-wrapper">
         <div class="project-skills-grid">
               
               <div class="project-skills-item" id = "technical-skills-view">
                   <div class="item-content">
                    <div class="project-skills-header">
                       <h2 >Technology Stack Used</p>
                    </div>  
                  
                     <div class = "project-skills-dropdown">
                        <img  src="/Images/DropDownSymbol.png" width = "60px" height = "60px" alt="">

                     </div>

                   </div>
                  
               </div>
              
         </div>
         <div class = "seperator" >
             
            <h3 class="seperator-text">Project responsibilites
            </h3>
            
         </div>

        

        
         
      
        
    </div>
     <div class="skills-view hide " id="technical-skills-view" >
           
            <div class="skill-view-section">
                <div class="technical-header">
                   <div class="X-button-container"><button class="X-button">X</button></div>

                <div class="techincal-header-left"><h2 class="technical-header-text">Technical Specification</h2></div> 
                
                </div>
                
             <div class="skill-view-content">
                    <h2 class="skill-view-desc">Languages:</h2>   
                     <div class="skill-grid">
                   <div class="skill-view-grid-item">
                     <p class="skill-view-item-name">C#</p>
                     <img class="skill-view-item-img" width = "60px" height = "60px" src="Images/Csharp_Logo.jpg" alt="">
                    </div>
                    
             </div>
             
            </div>
            <div class="skill-view-content">
                    <h2 class="skill-view-desc">Game Engine:</h2>   
                <div class="skill-grid">
                   <div class="skill-view-grid-item">
                     <p class="skill-view-item-name">Unity</p>
                     <img class="skill-view-item-img" width = "60px" height = "60px" src="Images/UnityIcon.png" alt="">
                    </div> 
                   </div>
            </div>


              <div class="skill-view-content">
                    <h2 class="skill-view-desc">Source Control:</h2>   
                <div class="skill-grid">
                   <div class="skill-view-grid-item">
                     <p class="skill-view-item-name">GitHub</p>
                     <img class="skill-view-item-img" width = "60px" height = "60px" src="Images/gitHubIcon.png" alt="">
                    </div> 
                   </div>
            </div>
        </div>
     </div>
</body>

<script type="module" src="ProjectPage.js"  ></script>
</html>
